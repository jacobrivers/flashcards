<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kid Flash Cards</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Kid Flash Cards</h1>
      <p>Pick a deck, show the card, and ask your child to say the word.</p>
    </div>
    <button id="libraryBtn" class="secondary">Deck Library</button>
  </header>

  <main>
    <section id="deckLibrary" class="deck-library"></section>

    <section id="studyView" class="study hidden" aria-live="polite">
      <div class="study-top">
        <button id="backBtn" class="secondary">← Decks</button>
        <div>
          <h2 id="deckTitle"></h2>
          <p id="cardCounter"></p>
        </div>
        <button id="shuffleBtn" class="secondary">Shuffle</button>
      </div>

      <article id="card" class="card">
        <div id="visual" class="visual"></div>
        <div id="word" class="word"></div>
        <div id="subtitle" class="subtitle"></div>
      </article>

      <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="speakBtn" class="secondary">Say Word</button>
        <button id="toggleWordBtn" class="secondary">Hide Word</button>
        <button id="nextBtn">Next</button>
      </div>
    </section>
  </main>

  <footer>
    Static site. No login, no tracking, no npm required.
  </footer>

  <script src="decks.js"></script>
  <script src="app.js"></script>
</body>
</html>
